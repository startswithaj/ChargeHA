name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Collapse redundant runs on rapid pushes to the same ref. Never cancel a main
# run mid-flight — it builds + releases.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      packages: write

  deploy-demo:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/demo.yml
    permissions:
      contents: read
      pages: write
      id-token: write
