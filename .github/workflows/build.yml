# Reusable build called by ci.yml on every push/PR.
#
# PR image behaviour vs build-pr.yml:
#   - Same-repo PRs: builds the MERGE commit and pushes pr-<n> + sha-<short>,
#     then comments the image tag on the PR.
#   - Fork PRs: builds only (fork PR tokens are read-only, so no push and no
#     comment). Maintainers comment /build on the PR to get an image via
#     build-pr.yml, which runs with this repo's token and pushes the PR's
#     HEAD commit under the same pr-<n> tag.
name: build

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build & push docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # non-main branches → branch-<name>
            type=ref,event=branch,prefix=branch-,enable=${{ github.ref != 'refs/heads/main' }}
            # PRs → pr-<n>
            type=ref,event=pr,prefix=pr-
            # main → both `main` and `latest`
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # every build → sha-<short>
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          # Fork PRs have a read-only GITHUB_TOKEN, so build without pushing.
          # Maintainers can comment /build on the PR to push (build-pr.yml).
          push: ${{ !github.event.pull_request.head.repo.fork }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Fork PRs are skipped — their images aren't pushed (read-only token).
      - name: Comment image tag on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-image-comment -->';
            const image =
              `ghcr.io/${context.repo.owner}/${context.repo.repo}`.toLowerCase() +
              `:pr-${context.issue.number}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              `📦 PR image published: \`${image}\``,
              '',
              '```bash',
              `docker pull ${image}`,
              '```',
              `_Built from \`${sha}\` — [view run](${runUrl})_`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
